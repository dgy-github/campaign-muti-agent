  <path d="M 836 202 C 808 250, 752 274, 710 282" stroke="#a76513" stroke-width="5" fill="none" marker-end="url(#rarrow)"/>
  <path d="M 696 346 C 760 390, 812 398, 872 392" stroke="#a76513" stroke-width="5" fill="none" marker-end="url(#rarrow)"/>
  <path d="M 882 392 C 630 484, 260 420, 210 312" stroke="#a76513" stroke-width="5" fill="none" stroke-dasharray="10 8" marker-end="url(#rarrow)"/>
